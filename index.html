<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beanz Settings Gen</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; display: flex; justify-content: center; overflow-x: hidden; }
        .card { background: #111; border: 2px solid #0f0; padding: 25px; border-radius: 12px; width: 100%; max-width: 600px; box-shadow: 0 0 30px rgba(0,255,0,0.1); position: relative; z-index: 10; }
        
        /* Admin Settings Icon - Always on top */
        .settings-icon { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; z-index: 1001; color: #0f0; }
        
        /* Offline Screen - Sits just below the settings icon */
        #offlineOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: red; z-index: 1000; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; text-align: center; flex-direction: column; }

        h2 { text-align: center; margin-top: 0; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #0f0; border-radius: 5px; outline: none; }
        button { width: 100%; padding: 15px; background: #0f0; border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 5px; margin: 10px 0; }
        
        /* Admin Modal */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        .modal-content { background: #111; border: 2px solid #0f0; padding: 20px; border-radius: 10px; width: 95%; max-width: 600px; color: #fff; }
        .user-list { max-height: 300px; overflow-y: auto; background: #000; padding: 10px; border: 1px solid #333; font-size: 11px; margin-top: 10px; }
        .user-item { border-bottom: 1px solid #222; padding: 10px 0; }
        .user-row { display: flex; justify-content: space-between; align-items: center; }
        .ban-btn { background: #440000; color: #ff0000; padding: 5px 10px; cursor: pointer; border: 1px solid red; border-radius: 3px; font-size: 10px; }
        .log-time { color: #888; font-size: 9px; margin-top: 4px; }

        #mainUI { display: none; }
        .loader-box { background: #050505; border: 1px dashed #0f0; padding: 15px; cursor: pointer; font-size: 11px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="settings-icon" onclick="openAdmin()">⚙️</div>

    <div id="offlineOverlay">
        ERROR: SYSTEM OFFLINE
        <span style="font-size: 14px; color: #888; margin-top: 10px;">The administrator has disabled this tool.</span>
    </div>

    <div class="card">
        <h2>BEANZ SETTINGS GEN</h2>

        <div id="loginSection" style="text-align:center;">
            <p style="color: #888;">Sign in with Gmail to continue</p>
            <div id="g_id_onload"
                 data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse">
            </div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>

        <div id="mainUI">
            <p id="welcomeMsg" style="font-size: 11px; color: #0f0; text-align: center;"></p>
            <input type="text" id="webhook" placeholder="Paste Discord Webhook URL">
            <button onclick="generate()">GENERATE SETTINGS</button>

            <div id="outputArea" style="display:none;">
                <p style="font-size: 10px; color: #888; margin-bottom: 2px;">1. Copy this code to Pastefy:</p>
                <textarea id="finalSource" readonly style="height: 100px; font-size: 10px;"></textarea>
                <p style="font-size: 10px; color: #888; margin-top: 10px;">2. Your Loader (Click to Copy):</p>
                <div class="loader-box" onclick="copyLoader()">loadstring(game:HttpGet('your pastefy raw link here'))()</div>
            </div>
        </div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3 style="color:#0f0; margin-top: 0;">ADMIN PANEL</h3>
            <div id="authPanel">
                <input type="password" id="adminPass" placeholder="Enter Code 2067">
                <button onclick="checkAdmin()">ACCESS SYSTEM</button>
            </div>
            <div id="controlPanel" style="display:none;">
                <div style="background: #222; padding: 15px; border-radius: 5px; margin-bottom: 15px;">
                    <label style="font-size: 12px; font-weight: bold;">SITE POWER:</label>
                    <button id="killSwitchBtn" onclick="toggleKillSwitch()" style="margin-top: 10px;"></button>
                </div>
                <p style="font-size: 12px; border-bottom: 1px solid #333; padding-bottom: 5px;">User Database & Logs:</p>
                <div class="user-list" id="userList"></div>
                <button onclick="closeAdmin()" style="background: #333; color: #fff;">EXIT ADMIN</button>
            </div>
        </div>
    </div>

    <script>
        let isOnline = localStorage.getItem('siteOnline') !== 'false';
        let bannedEmails = JSON.parse(localStorage.getItem('bannedEmails')) || [];
        let userDatabase = JSON.parse(localStorage.getItem('userDatabase')) || {}; // Stores email: timestamp
        let currentUserEmail = "";

        // Apply Kill Switch immediately
        if (!isOnline) { document.getElementById('offlineOverlay').style.display = 'flex'; }

        function handleCredentialResponse(response) {
            const responsePayload = parseJwt(response.credential);
            currentUserEmail = responsePayload.email;

            if (bannedEmails.includes(currentUserEmail)) {
                alert("ACCESS DENIED: " + currentUserEmail + " is banned.");
                return;
            }

            // Update Database with current time
            const now = new Date();
            userDatabase[currentUserEmail] = now.toLocaleString();
            localStorage.setItem('userDatabase', JSON.stringify(userDatabase));

            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainUI').style.display = 'block';
            document.getElementById('welcomeMsg').innerText = "Verified: " + currentUserEmail;
        }

        function generate() {
            const webhook = document.getElementById('webhook').value.trim();
            if (!webhook.includes("discord.com")) return alert("Please provide a valid Discord Webhook!");
            
            document.getElementById('finalSource').value = `getgenv().WEBHOOK_URL = "${webhook}"\ngetgenv().WANTED_BRAINROTS = { "1x1x1x1", "25", "67" }\ngetgenv().SCRIPT_KEY = "KEYLESS"`;
            document.getElementById('outputArea').style.display = 'block';
        }

        function toggleKillSwitch() {
            isOnline = !isOnline;
            localStorage.setItem('siteOnline', isOnline);
            location.reload();
        }

        function toggleBan(email) {
            if (bannedEmails.includes(email)) {
                bannedEmails = bannedEmails.filter(e => e !== email);
            } else {
                bannedEmails.push(email);
            }
            localStorage.setItem('bannedEmails', JSON.stringify(bannedEmails));
            updateUserList();
        }

        function checkAdmin() {
            if (document.getElementById('adminPass').value === "2067") {
                document.getElementById('authPanel').style.display = 'none';
                document.getElementById('controlPanel').style.display = 'block';
                const btn = document.getElementById('killSwitchBtn');
                btn.innerText = isOnline ? "TURN WEBSITE OFF" : "TURN WEBSITE ON";
                btn.style.background = isOnline ? "red" : "green";
                btn.style.color = "white";
                updateUserList();
            } else { alert("Incorrect Admin Code."); }
        }

        function updateUserList() {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            Object.keys(userDatabase).reverse().forEach(email => {
                const isBanned = bannedEmails.includes(email);
                const lastLogin = userDatabase[email];
                list.innerHTML += `
                <div class="user-item">
                    <div class="user-row">
                        <span style="color: ${isBanned ? 'red' : '#fff'};">${email}</span>
                        <button class="ban-btn" onclick="toggleBan('${email}')">${isBanned ? 'UNBAN' : 'BAN'}</button>
                    </div>
                    <div class="log-time">Last used: ${lastLogin}</div>
                </div>`;
            });
        }

        function openAdmin() { document.getElementById('adminModal').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; }
        function parseJwt(t) { var b = t.split('.')[1]; return JSON.parse(atob(b.replace(/-/g, '+').replace(/_/g, '/'))); }
        function copyLoader() { navigator.clipboard.writeText("loadstring(game:HttpGet('your pastefy raw link here'))()"); alert("Loader Copied!"); }
    </script>
</body>
</html>
