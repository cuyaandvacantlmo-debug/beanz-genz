<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beanz Settings Gen</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; display: flex; justify-content: center; overflow-x: hidden; }
        .card { background: #111; border: 2px solid #0f0; padding: 25px; border-radius: 12px; width: 100%; max-width: 600px; box-shadow: 0 0 30px rgba(0,255,0,0.1); position: relative; }
        
        /* Admin Settings Icon */
        .settings-icon { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; transition: 0.3s; }
        .settings-icon:hover { transform: rotate(90deg); color: #fff; }

        h2 { text-align: center; margin-top: 0; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #0f0; box-sizing: border-box; border-radius: 5px; outline: none; }
        textarea { height: 120px; border-color: #0f0; }
        button { width: 100%; padding: 15px; background: #0f0; border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 5px; margin: 10px 0; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 10; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: #111; border: 2px solid #0f0; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; color: #fff; }
        .user-list { max-height: 200px; overflow-y: auto; background: #000; padding: 10px; border: 1px solid #333; font-size: 11px; margin-top: 10px; }
        .user-item { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 5px 0; }
        .ban-btn { color: red; cursor: pointer; font-weight: bold; }

        .instruction { background: #1a1a1a; padding: 15px; border-left: 4px solid #0f0; margin: 20px 0; font-size: 13px; color: #fff; display: none; }
        .loader-box { background: #050505; border: 1px dashed #0f0; padding: 15px; display: none; cursor: pointer; font-size: 12px; }
        .label { color: #888; font-size: 11px; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="card">
        <div class="settings-icon" onclick="openAdmin()">⚙️</div>
        <h2>BEANZ SETTINGS GEN</h2>
        <p style="color: #888; font-size: 12px; text-align: center;">Enter Webhook to generate settings</p>
        
        <input type="text" id="webhook" placeholder="Paste Discord Webhook URL">
        <button onclick="generate()">GENERATE SETTINGS</button>

        <div id="stepSection" class="instruction">
            <b style="color: #0f0;">HOW TO USE:</b><br>
            1. Copy the code below.<br>
            2. Put it in Pastefy.app and get the Raw link.<br>
            3. Paste the Raw link in the Loader box.
        </div>

        <textarea id="finalSource" style="display:none;" readonly></textarea>
        <div id="loaderBox" class="loader-box" onclick="copyCode('loaderBox')">
            loadstring(game:HttpGet('your pastefy raw link here'))()
        </div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3>Admin Panel</h3>
            <div id="authPanel">
                <input type="password" id="adminPass" placeholder="Enter Admin Code">
                <button onclick="checkAdmin()">LOGIN</button>
            </div>
            <div id="controlPanel" style="display:none;">
                <p>User Webhooks (Active):</p>
                <div class="user-list" id="userList"></div>
                <button onclick="closeAdmin()">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        let bannedUsers = JSON.parse(localStorage.getItem('bannedUsers')) || [];
        let logUsers = JSON.parse(localStorage.getItem('logUsers')) || [];

        function generate() {
            const webhook = document.getElementById('webhook').value.trim();
            if (!webhook.includes("discord.com")) return alert("Please enter a Webhook!");

            if (bannedUsers.includes(webhook)) {
                return alert("You are BANNED. Please talk to an admin.");
            }

            // Log user for admin view
            if (!logUsers.includes(webhook)) {
                logUsers.push(webhook);
                localStorage.setItem('logUsers', JSON.stringify(logUsers));
            }

            const combined = `getgenv().WEBHOOK_URL = "${webhook}"
getgenv().WANTED_BRAINROTS = { "1x1x1x1", "25", "67" } -- shortened for preview
getgenv().SCRIPT_KEY = "KEYLESS"`;

            document.getElementById('finalSource').value = combined;
            document.getElementById('stepSection').style.display = "block";
            document.getElementById('finalSource').style.display = "block";
            document.getElementById('loaderBox').style.display = "block";
        }

        function openAdmin() {
            document.getElementById('adminModal').style.display = 'flex';
        }

        function checkAdmin() {
            const code = document.getElementById('adminPass').value;
            if (code === "2067") {
                document.getElementById('authPanel').style.display = 'none';
                document.getElementById('controlPanel').style.display = 'block';
                updateUserList();
            } else {
                alert("Wrong Code!");
            }
        }

        function updateUserList() {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            logUsers.forEach(user => {
                const isBanned = bannedUsers.includes(user);
                list.innerHTML += `
                    <div class="user-item">
                        <span>${user.substring(0, 30)}...</span>
                        <span class="ban-btn" onclick="toggleBan('${user}')">${isBanned ? '[UNBAN]' : '[BAN]'}</span>
                    </div>`;
            });
        }

        function toggleBan(user) {
            if (bannedUsers.includes(user)) {
                bannedUsers = bannedUsers.filter(u => u !== user);
            } else {
                bannedUsers.push(user);
            }
            localStorage.setItem('bannedUsers', JSON.stringify(bannedUsers));
            updateUserList();
        }

        function closeAdmin() {
            document.getElementById('adminModal').style.display = 'none';
        }

        function copyCode(id) {
            const el = document.getElementById(id);
            let text = (el.tagName === "TEXTAREA") ? el.value : el.innerText;
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }
    </script>
</body>
</html>
