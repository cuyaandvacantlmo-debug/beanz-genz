<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beanz Settings Gen</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; display: flex; justify-content: center; overflow-x: hidden; }
        .card { background: #111; border: 2px solid #0f0; padding: 25px; border-radius: 12px; width: 100%; max-width: 600px; box-shadow: 0 0 30px rgba(0,255,0,0.1); position: relative; }
        
        /* Admin Settings Icon */
        .settings-icon { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; z-index: 5; }
        
        /* Offline Screen */
        #offlineOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: red; z-index: 100; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; text-align: center; }

        h2 { text-align: center; margin-top: 0; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #0f0; border-radius: 5px; outline: none; }
        button { width: 100%; padding: 15px; background: #0f0; border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 5px; margin: 10px 0; }
        
        /* Admin Modal */
        .modal { display: none; position: fixed; z-index: 150; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        .modal-content { background: #111; border: 2px solid #0f0; padding: 20px; border-radius: 10px; width: 90%; max-width: 500px; color: #fff; }
        .user-list { max-height: 250px; overflow-y: auto; background: #000; padding: 10px; border: 1px solid #333; font-size: 11px; margin-top: 10px; }
        .user-item { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 8px 0; align-items: center; }
        .ban-btn { background: #440000; color: #ff0000; padding: 5px; cursor: pointer; border: 1px solid red; border-radius: 3px; }

        #mainUI { display: none; }
        .loader-box { background: #050505; border: 1px dashed #0f0; padding: 15px; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

    <div id="offlineOverlay">ERROR: SYSTEM OFFLINE<br><span style="font-size: 14px; color: #888;">Please contact an admin.</span></div>

    <div class="card">
        <div class="settings-icon" onclick="openAdmin()">⚙️</div>
        <h2>BEANZ SETTINGS GEN</h2>

        <div id="loginSection" style="text-align:center;">
            <p style="color: #888;">Sign in with Gmail to use the generator</p>
            <div id="g_id_onload"
                 data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse">
            </div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>

        <div id="mainUI">
            <p id="welcomeMsg" style="font-size: 12px; color: #0f0;"></p>
            <input type="text" id="webhook" placeholder="Paste Discord Webhook URL">
            <button onclick="generate()">GENERATE SETTINGS</button>

            <div id="outputArea" style="display:none;">
                <p style="font-size: 11px; color: #888;">Copy this to Pastefy:</p>
                <textarea id="finalSource" readonly></textarea>
                <p style="font-size: 11px; color: #888;">Then put raw link here:</p>
                <div class="loader-box" onclick="copyLoader()">loadstring(game:HttpGet('your pastefy raw link here'))()</div>
            </div>
        </div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3 style="color:#0f0;">ADMIN CONTROL</h3>
            <div id="authPanel">
                <input type="password" id="adminPass" placeholder="Enter Code 2067">
                <button onclick="checkAdmin()">LOGIN</button>
            </div>
            <div id="controlPanel" style="display:none;">
                <div style="background: #222; padding: 10px; margin-bottom: 10px;">
                    <label>WEBSITE STATUS:</label>
                    <button id="killSwitchBtn" onclick="toggleKillSwitch()" style="background: green; color: white;">ONLINE</button>
                </div>
                <p>Gmail User Database:</p>
                <div class="user-list" id="userList"></div>
                <button onclick="closeAdmin()">BACK</button>
            </div>
        </div>
    </div>

    <script>
        let isOnline = localStorage.getItem('siteOnline') !== 'false';
        let bannedEmails = JSON.parse(localStorage.getItem('bannedEmails')) || [];
        let loggedUsers = JSON.parse(localStorage.getItem('loggedUsers')) || [];
        let currentUserEmail = "";

        // Check Kill Switch on load
        if (!isOnline) { document.getElementById('offlineOverlay').style.display = 'flex'; }

        function handleCredentialResponse(response) {
            const responsePayload = parseJwt(response.credential);
            currentUserEmail = responsePayload.email;

            if (bannedEmails.includes(currentUserEmail)) {
                alert("Your Gmail (" + currentUserEmail + ") is BANNED. Talk to admin.");
                return;
            }

            // Log the user
            if (!loggedUsers.includes(currentUserEmail)) {
                loggedUsers.push(currentUserEmail);
                localStorage.setItem('loggedUsers', JSON.stringify(loggedUsers));
            }

            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainUI').style.display = 'block';
            document.getElementById('welcomeMsg').innerText = "Logged in as: " + currentUserEmail;
        }

        function generate() {
            const webhook = document.getElementById('webhook').value.trim();
            if (!webhook.includes("discord.com")) return alert("Invalid Webhook!");
            
            document.getElementById('finalSource').value = `getgenv().WEBHOOK_URL = "${webhook}"\ngetgenv().WANTED_BRAINROTS = { "1x1x1x1", "25" }\ngetgenv().SCRIPT_KEY = "KEYLESS"`;
            document.getElementById('outputArea').style.display = 'block';
        }

        function toggleKillSwitch() {
            isOnline = !isOnline;
            localStorage.setItem('siteOnline', isOnline);
            location.reload();
        }

        function toggleBan(email) {
            if (bannedEmails.includes(email)) {
                bannedEmails = bannedEmails.filter(e => e !== email);
            } else {
                bannedEmails.push(email);
            }
            localStorage.setItem('bannedEmails', JSON.stringify(bannedEmails));
            updateUserList();
        }

        function checkAdmin() {
            if (document.getElementById('adminPass').value === "2067") {
                document.getElementById('authPanel').style.display = 'none';
                document.getElementById('controlPanel').style.display = 'block';
                const btn = document.getElementById('killSwitchBtn');
                btn.innerText = isOnline ? "ONLINE" : "OFFLINE (KILL-SWITCHED)";
                btn.style.background = isOnline ? "green" : "red";
                updateUserList();
            }
        }

        function updateUserList() {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            loggedUsers.forEach(email => {
                const isBanned = bannedEmails.includes(email);
                list.innerHTML += `<div class="user-item">
                    <span>${email}</span>
                    <button class="ban-btn" onclick="toggleBan('${email}')">${isBanned ? 'UNBAN' : 'BAN'}</button>
                </div>`;
            });
        }

        function openAdmin() { document.getElementById('adminModal').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; }
        function parseJwt(t) { var b = t.split('.')[1]; return JSON.parse(atob(b.replace(/-/g, '+').replace(/_/g, '/'))); }
        function copyLoader() { navigator.clipboard.writeText("loadstring(game:HttpGet('your pastefy raw link here'))()"); alert("Loader Copied!"); }
    </script>
</body>
</html>
